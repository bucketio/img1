<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">浏览器无痕模式封面</title>
  <desc id="desc">浏览器窗口中显示本机记录被隐藏，但网络侧仍有访问路径。</desc>
  <rect width="1200" height="675" fill="#f5f7fb"/>
  <rect x="96" y="84" width="1008" height="506" rx="34" fill="#ffffff" stroke="#d9deea" stroke-width="3"/>
  <rect x="96" y="84" width="1008" height="82" rx="34" fill="#202938"/>
  <circle cx="145" cy="125" r="12" fill="#ff6b6b"/>
  <circle cx="185" cy="125" r="12" fill="#f2b84b"/>
  <circle cx="225" cy="125" r="12" fill="#52b788"/>
  <text x="126" y="248" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#182033">无痕模式，真的无痕吗？</text>
  <text x="128" y="304" font-family="Arial, sans-serif" font-size="27" fill="#5f6b80">它隐藏的是本机记录，不是整个网络身份</text>
  <g transform="translate(160 365)">
    <rect x="0" y="0" width="300" height="120" rx="22" fill="#edf5ff"/>
    <text x="38" y="53" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#2f6bd9">本机历史</text>
    <text x="38" y="91" font-family="Arial, sans-serif" font-size="21" fill="#334155">关闭窗口后减少保存</text>
  </g>
  <g transform="translate(520 365)">
    <rect x="0" y="0" width="300" height="120" rx="22" fill="#fff5df"/>
    <text x="38" y="53" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#946200">网站和账号</text>
    <text x="38" y="91" font-family="Arial, sans-serif" font-size="21" fill="#334155">仍可能识别访问</text>
  </g>
  <path d="M460 425 H520" stroke="#607089" stroke-width="5" stroke-dasharray="10 8"/>
  <rect x="864" y="378" width="94" height="94" rx="47" fill="#1f2937"/>
  <circle cx="911" cy="416" r="22" fill="#ffffff"/>
  <rect x="877" y="431" width="68" height="18" rx="9" fill="#ffffff"/>
</svg>
