<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">20% 是经验值而不是硬性红线</title>
  <desc id="desc">用刻度尺说明20%只是保守建议，真正需要关注的是可用周转空间。</desc>
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="48" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#182033">20% 不是红线</text>
  <text x="50" y="112" font-family="Arial, sans-serif" font-size="22" fill="#5f6b80">它更像一个好记、偏保守的经验值</text>
  <rect x="70" y="190" width="760" height="76" rx="18" fill="#eef2f8"/>
  <rect x="70" y="190" width="608" height="76" rx="18" fill="#4c8bf5"/>
  <rect x="678" y="190" width="152" height="76" rx="18" fill="#52b788"/>
  <line x1="678" y1="160" x2="678" y2="298" stroke="#1f2937" stroke-width="4"/>
  <text x="638" y="145" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">20%</text>
  <text x="108" y="238" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">可使用空间</text>
  <text x="700" y="238" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">建议余量</text>
  <rect x="118" y="330" width="664" height="48" rx="24" fill="#f6f7fb" stroke="#d9deea"/>
  <text x="155" y="361" font-family="Arial, sans-serif" font-size="21" fill="#334155">关键不是卡在20%，而是别让系统没有周转空间</text>
</svg>
